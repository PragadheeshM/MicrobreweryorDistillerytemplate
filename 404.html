<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | Copper & Cask</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin /><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script><script src="tailwind-config.js"></script>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
</head>
<body class="font-body">
  <!-- Toggles (Fixed outside cards) -->
  <div class="fixed top-4 right-4 sm:top-6 sm:right-6 z-[60] flex items-center gap-2 sm:gap-3">
    <button id="theme-toggle" class="auth-floating-toggle w-10 h-10 rounded-xl flex items-center justify-center transition-all" title="Toggle Dark / Light Mode">
      <i class="fas fa-moon theme-icon text-base"></i>
    </button>
    <button id="rtl-toggle" class="auth-floating-toggle px-3 h-10 rounded-xl flex items-center justify-center transition-all font-semibold text-xs" title="Toggle RTL/LTR">
      RTL
    </button>
  </div>

  <div class="min-h-screen bg-black flex items-center justify-center relative overflow-hidden">
    <div class="absolute inset-0 bg-gradient-to-br from-black via-black/85 to-accent/20"></div>
    <div class="absolute top-1/4 right-1/4 w-96 h-96 rounded-full bg-accent/5 blur-3xl animate-float"></div>
    <div class="absolute bottom-1/4 left-1/4 w-72 h-72 rounded-full bg-accent/10 blur-3xl animate-float-slow"></div>

    <div class="relative z-10 text-center px-4 max-w-lg">
      <!-- Logo -->
      <a href="index.html" class="inline-flex items-center gap-2.5 mb-10 group">
        <div class="w-12 h-12 rounded-xl bg-accent flex items-center justify-center shadow-accent transition-transform group-hover:rotate-6">
          <i class="fas fa-whiskey-glass text-white text-xl"></i>
        </div>
        <span class="font-display text-2xl font-semibold text-white">Copper <span class="text-accent">&</span> Cask</span>
      </a>

      <div class="text-[10rem] sm:text-[14rem] font-display font-semibold leading-none text-transparent bg-clip-text bg-gradient-to-r from-accent via-accent-light to-accent mb-0" style="-webkit-background-clip: text;">
        404
      </div>
      <h1 class="font-display text-3xl sm:text-4xl font-semibold text-white mb-4 -mt-4">Oops! This Barrel's Empty</h1>
      <p class="text-white/70 mb-8 text-lg">The page you're looking for doesn't exist or has been moved. Maybe it's aging in the cellar?</p>
      <div class="flex flex-wrap justify-center gap-4">
        <a href="index.html" class="btn-primary text-base px-8 py-3.5"><i class="fas fa-compass"></i> Explore Our Craft</a>
        <a href="contact.html" class="btn-outline text-base px-8 py-3.5"><i class="fas fa-headset"></i> Contact Support</a>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
