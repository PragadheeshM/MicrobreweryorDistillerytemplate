<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon — Copper & Cask</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin /><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script><script src="tailwind-config.js"></script>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
</head>
<body class="font-body">

  <div class="min-h-screen flex items-center justify-center relative overflow-hidden">
    <!-- Background -->
    <div class="absolute inset-0">
      <img src="https://images.unsplash.com/photo-1516997121675-4c2d1684aa3e?w=1920&q=80&fit=crop" alt="Barrels background" class="w-full h-full object-cover" />
    </div>
    <div class="absolute inset-0 bg-gradient-to-b from-primary/90 via-primary/80 to-primary/95"></div>

    <div class="relative z-10 text-center px-4 max-w-2xl w-full">
      <!-- Logo -->
      <a href="index.html" class="inline-flex items-center gap-2.5 mb-10">
        <div class="w-12 h-12 rounded-xl bg-accent flex items-center justify-center shadow-accent">
          <i class="fas fa-whiskey-glass text-white text-xl"></i>
        </div>
        <span class="font-display text-2xl font-semibold text-white">Copper <span class="text-accent">&</span> Cask</span>
      </a>

      <h1 class="font-display text-4xl sm:text-5xl lg:text-6xl font-semibold text-white mb-4">
        Something <span class="text-accent">Amazing</span> is Brewing
      </h1>
      <p class="text-white/50 text-lg mb-12 max-w-lg mx-auto">We're crafting something special for you. Stay tuned for our newest release.</p>

      <!-- Countdown -->
      <div id="countdown" class="flex justify-center gap-4 sm:gap-6 mb-12">
        <div class="countdown-unit">
          <div class="countdown-number" id="cd-days">00</div>
          <div class="countdown-label">Days</div>
        </div>
        <div class="countdown-unit">
          <div class="countdown-number" id="cd-hours">00</div>
          <div class="countdown-label">Hours</div>
        </div>
        <div class="countdown-unit">
          <div class="countdown-number" id="cd-minutes">00</div>
          <div class="countdown-label">Minutes</div>
        </div>
        <div class="countdown-unit">
          <div class="countdown-number" id="cd-seconds">00</div>
          <div class="countdown-label">Seconds</div>
        </div>
      </div>

      <!-- Notify Form -->
      <form data-mock-form class="flex flex-col sm:flex-row gap-3 max-w-md mx-auto mb-8">
        <input type="email" placeholder="Enter your email" required class="flex-1 px-5 py-3.5 rounded-xl bg-white/10 border border-white/15 text-white placeholder:text-white/40 focus:outline-none focus:border-accent transition-all font-body" />
        <button type="submit" class="btn-primary px-6 py-3.5 whitespace-nowrap"><i class="fas fa-bell"></i> Notify Me</button>
      </form>

      <!-- Social Links -->
      <div class="flex justify-center gap-4">
        <a href="#" class="social-icon"><i class="fab fa-facebook-f"></i></a>
        <a href="#" class="social-icon"><i class="fab fa-instagram"></i></a>
        <a href="#" class="social-icon"><i class="fab fa-twitter"></i></a>
        <a href="#" class="social-icon"><i class="fab fa-youtube"></i></a>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="main.js"></script>
</body>
</html>
