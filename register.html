<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Copper & Cask</title>
  <meta name="description" content="Create your Copper & Cask account and join our craft community." />
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin /><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script><script src="tailwind-config.js"></script>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
</head>
<body class="font-body">

  <div class="auth-bg">
    <img src="https://images.unsplash.com/photo-1532634993-15f421e42ec0?w=1920&q=80&fit=crop" alt="Whiskey barrels background" />
    
    <!-- Auth Toggles (Outside Card) -->
    <div class="fixed top-4 right-4 sm:top-6 sm:right-6 z-50 flex items-center gap-2 sm:gap-3">
      <button id="theme-toggle" class="auth-floating-toggle w-9 h-9 sm:w-10 sm:h-10 rounded-xl flex items-center justify-center transition-all backdrop-blur-md border" title="Toggle Dark / Light Mode">
        <i class="fas fa-moon theme-icon text-sm sm:text-base"></i>
      </button>
      <button id="rtl-toggle" class="auth-floating-toggle px-3 h-9 sm:px-4 sm:h-10 rounded-xl flex items-center justify-center transition-all font-semibold text-[10px] sm:text-xs backdrop-blur-md border" title="Toggle RTL/LTR">
        RTL
      </button>
    </div>

    <div class="auth-card animate-fade-in" style="max-width: 480px;">

      <!-- Logo -->
      <div class="text-center mb-8">
        <a href="index.html" class="inline-flex items-center gap-2.5">
          <div class="w-11 h-11 rounded-xl bg-accent flex items-center justify-center shadow-accent">
            <i class="fas fa-whiskey-glass text-white text-lg"></i>
          </div>
          <span class="font-display text-2xl font-semibold text-white tracking-tight">Copper <span class="text-accent">&</span> Cask</span>
        </a>
        <p class="text-white/40 text-sm mt-3">Join the community. Create your account.</p>
      </div>

      <!-- Form -->
      <form data-auth-form="register" class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div class="input-group">
            <i class="fas fa-user input-icon"></i>
            <input type="text" class="auth-input" placeholder="First name" required />
          </div>
          <div class="input-group">
            <i class="fas fa-user input-icon"></i>
            <input type="text" class="auth-input" placeholder="Last name" required />
          </div>
        </div>
        <div class="input-group">
          <i class="fas fa-envelope input-icon"></i>
          <input type="email" class="auth-input" placeholder="Email address" required />
        </div>
        <div class="input-group">
          <i class="fas fa-phone input-icon"></i>
          <input type="tel" class="auth-input" placeholder="Phone number" />
        </div>
        <div class="input-group">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" class="auth-input" placeholder="Password" required />
        </div>
        <div class="input-group">
          <i class="fas fa-shield-halved input-icon"></i>
          <input type="password" class="auth-input" placeholder="Confirm password" required />
        </div>

        <label class="flex items-start gap-2 text-white/50 text-xs cursor-pointer">
          <input type="checkbox" class="w-4 h-4 mt-0.5 rounded border-white/20 bg-white/10 text-accent focus:ring-accent" required />
          <span>I agree to the <a href="#" class="text-accent">Terms of Service</a> and <a href="#" class="text-accent">Privacy Policy</a>. I confirm I am 21 years or older.</span>
        </label>

        <button type="submit" class="btn-primary w-full py-3">
          <i class="fas fa-user-plus"></i> Create Account
        </button>
      </form>

      <!-- Divider -->
      <div class="flex items-center gap-4 my-6">
        <div class="flex-1 h-px bg-white/10"></div>
        <span class="text-white/30 text-xs uppercase tracking-wider">or sign up with</span>
        <div class="flex-1 h-px bg-white/10"></div>
      </div>

      <!-- Social -->
      <div class="grid grid-cols-3 gap-3 mb-6">
        <button class="flex items-center justify-center gap-2 py-2.5 rounded-xl bg-white/8 border border-white/10 text-white/60 hover:text-white transition-all text-sm btn-social-google"><i class="fab fa-google"></i></button>
        <button class="flex items-center justify-center gap-2 py-2.5 rounded-xl bg-white/8 border border-white/10 text-white/60 hover:text-white transition-all text-sm btn-social-apple"><i class="fab fa-apple"></i></button>
        <button class="flex items-center justify-center gap-2 py-2.5 rounded-xl bg-white/8 border border-white/10 text-white/60 hover:text-white transition-all text-sm btn-social-facebook"><i class="fab fa-facebook-f"></i></button>
      </div>

      <p class="text-center text-white/40 text-sm">
        Already have an account? <a href="login.html" class="text-accent hover:text-accent-light font-semibold transition-colors">Sign in</a>
      </p>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="main.js"></script>
</body>
</html>
